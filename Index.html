<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U8 Bulucu</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    padding:20px;
}

input,button{
    padding:10px;
    width:100%;
    margin-top:10px;
}

#result{
    margin-top:20px;
    background:#222;
    padding:15px;
    word-break:break-all;
}
</style>
</head>
<body>

<h2>M3U8 Link Bulucu</h2>

<input type="text" id="url" placeholder="https://site.com">

<button onclick="getM3U8()">Tara</button>

<div id="result"></div>

<script>

async function getM3U8(){

    const url = document.getElementById("url").value;

    const result = document.getElementById("result");

    result.innerHTML = "Taranıyor...";

    try{

        // CORS Proxy
        const proxy = "https://api.allorigins.win/raw?url=";

        const response = await fetch(proxy + encodeURIComponent(url));

        const html = await response.text();

        // m3u8 regex
        const regex = /https?:\/\/[^"' ]+\.m3u8(\?[^"' ]*)?/gi;

        const matches = html.match(regex);

        if(matches && matches.length > 0){

            result.innerHTML = "";

            matches.forEach(link => {

                result.innerHTML += `
                    <p>
                        <a href="${link}" target="_blank" style="color:lime;">
                            ${link}
                        </a>
                    </p>
                `;
            });

        }else{

            result.innerHTML = "m3u8 bulunamadı.";

        }

    }catch(e){

        result.innerHTML = "Hata: " + e;

    }

}

</script>

</body>
</html>
